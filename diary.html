<!-- 비밀번호 설정 여부 묻기 -->
<div id="pwAskModal" hidden style="position:fixed;inset:0;z-index:9998;background:#15151a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;user-select:none;-webkit-user-select:none">
  <div style="font-size:30px;font-weight:700;color:#fff;font-family:'Gowun Batang',serif;margin-bottom:10px">Diary</div>
  <div style="font-size:17px;color:#eee;text-align:center;line-height:1.5;margin-bottom:36px">일기를 비밀번호로<br>보호하시겠습니까?</div>
  <div style="display:flex;gap:12px;width:100%;max-width:320px">
    <button id="pwAskNo" style="flex:1;padding:18px;border-radius:16px;border:1px solid #3a3a42;background:#23232a;color:#ddd;font-size:17px;font-weight:600;cursor:pointer">아니오</button>
    <button id="pwAskYes" style="flex:1;padding:18px;border-radius:16px;border:0;background:#9C7A2B;color:#fff;font-size:17px;font-weight:700;cursor:pointer">네</button>
  </div>
</div>

<!-- 4자리 비밀번호 설정 -->
<div id="pwSetModal" hidden style="position:fixed;inset:0;z-index:9998;background:#15151a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;user-select:none;-webkit-user-select:none">
  <div id="pwSetLabel" style="font-size:18px;color:#fff;text-align:center;margin-bottom:18px">새 비밀번호 4자리를 입력하세요</div>
  <div id="pwSetDots" class="pin-dots" style="margin-bottom:14px"></div>
  <div id="pwSetErr" style="color:#E23B3B;font-size:14px;min-height:22px;margin-bottom:10px"></div>
  <div id="pwSetPad" class="pinpad" style="max-width:300px"></div>
</div>

<!-- 잠금 화면 (접속 시 비밀번호 입력) -->
<div id="lockScreen" hidden style="position:fixed;inset:0;z-index:9997;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#15151a;padding:28px;user-select:none;-webkit-user-select:none">
  <div style="font-size:30px;font-weight:700;color:#fff;font-family:'Gowun Batang',serif;margin-bottom:6px">Diary</div>
  <div id="lockLabel" style="font-size:15px;color:#bbb;margin-bottom:22px">비밀번호를 입력하세요</div>
  <div id="lockDots" class="pin-dots" style="margin-bottom:14px"></div>
  <div id="lockErr" style="color:#E23B3B;font-size:14px;min-height:22px;margin-bottom:10px"></div>
  <div id="lockPad" class="pinpad" style="max-width:300px"></div>
</div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Gaegu:wght@300;400;700&family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&family=Jua&family=Nanum+Pen+Script&family=Black+Han+Sans&display=swap');

  #app{
    --bg:#F4F1EA; --surface:#FBF9F4; --surface-2:#EFEBE1;
    --ink:#2A2722; --ink-soft:#968E7E; --line:#E5DED1;
    --accent:#9C7A2B; --accent-soft:#EBE1C7; --on-accent:#FFFFFF;
    --mark:#E23B3B;
    --f-body:'Gaegu','Gowun Batang',serif;
    transition:background .5s ease,color .5s ease;
  }
  *{box-sizing:border-box}
  #app{font-family:var(--f-body);color:var(--ink);background:var(--bg);min-height:100vh;padding:22px clamp(14px,4vw,40px) 60px;line-height:1.5}
  svg{display:block}

  /* 첫 화면 */
  #intro{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
  .intro-card{max-width:460px;width:100%;text-align:center}
  .intro-q{font-family:var(--f-body);font-size:clamp(22px,4.5vw,30px);font-weight:700;margin:0 0 28px;color:var(--ink)}
  .intro-btns{display:flex;gap:14px}
  .intro-btns button{flex:1;cursor:pointer;border:1px solid var(--line);border-radius:18px;background:var(--surface);color:var(--ink);padding:26px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:var(--f-body);transition:transform .15s ease,border-color .15s ease}
  .intro-btns button:hover{transform:translateY(-3px);border-color:var(--accent)}
  .intro-btns .em{color:var(--accent)} .intro-btns .em svg{width:32px;height:32px}
  .intro-btns strong{font-size:20px;font-weight:700} .intro-btns small{color:var(--ink-soft);font-size:13px}

  /* 상단바 */
  .topbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:0 auto 22px;max-width:980px}
  .mode-toggle{display:inline-flex;background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:4px}
  .seg{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;cursor:pointer;color:var(--ink-soft);font-family:var(--f-body);font-size:15px;padding:7px 15px;border-radius:999px}
  .seg .ic-slot svg{width:15px;height:15px}
  .seg.active{background:var(--accent);color:var(--on-accent)}
  .date-wrap{position:relative;display:inline-flex;align-items:center}
  #dateLabel{border:0;background:transparent;cursor:pointer;color:var(--ink);font-family:var(--f-body);font-size:19px;font-weight:700;padding:2px 6px;border-radius:8px}
  #dateLabel:hover{background:var(--surface-2)}
  #navDate{position:absolute;left:0;opacity:0;width:1px;height:1px;pointer-events:none}
  .icon-btn{border:1px solid var(--line);background:var(--surface);cursor:pointer;width:34px;height:34px;border-radius:10px;color:var(--ink);display:inline-flex;align-items:center;justify-content:center;transition:border-color .15s ease}
  .icon-btn svg{width:18px;height:18px}
  .icon-btn:hover{border-color:var(--accent)}
  .icon-btn.set{border-color:var(--accent);color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .save-state{margin-left:auto;font-size:13px;color:var(--ink-soft);min-height:18px;align-self:center}
  .pop-wrap{position:relative}

  function renderRoutines(){

    visible.forEach(rt=>{
      const row=document.createElement('div');row.className='routine-row';
      const done=!!day.done[rt.id];
      const missed=past&&!done;
      const chk=document.createElement('button');chk.className='chk'+(done?' on':'');chk.innerHTML=done?ICON.check:'';chk.setAttribute('aria-label','완료');
      chk.onclick=()=>{day.done[rt.id]=!day.done[rt.id];renderRoutines();scheduleSaveDay();};

      row.append(chk,inp);

      else if(missed){const mm=document.createElement('span');mm.className='rmiss';mm.textContent='괜찮아 다시 할 수 있어';row.appendChild(mm);}

  /* 사진 */
  function readPhotos(files){
    if(!day.photos)day.photos=[];
    const list=Array.from(files).slice(0,4-day.photos.length);
    let pending=list.length;if(!pending)return;
    list.forEach(file=>{
      const fr=new FileReader();
      fr.onload=()=>{const img=new Image();img.onload=()=>{
        const max=1200,sc=Math.min(1,max/Math.max(img.width,img.height));
        const c=document.createElement('canvas');c.width=img.width*sc;c.height=img.height*sc;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        day.photos.push(c.toDataURL('image/jpeg',0.82));
        pending--;if(pending<=0){renderPhotos();scheduleSaveDay();}
      };img.onerror=()=>{pending--;if(pending<=0){renderPhotos();scheduleSaveDay();}};img.src=fr.result;};
      fr.readAsDataURL(file);
    });
  }

  function reflectAlarm(){const b=document.getElementById('alarmBtn');b.classList.toggle('set',!!reminderTime);b.title=reminderTime?('알람 '+reminderTime):'알람 설정';}
  function ensureAudio(){try{if(!audioCtx){const AC=window.AudioContext||window.webkitAudioContext;if(AC)audioCtx=new AC();}if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}catch(e){}}
  function beep(){try{if(!audioCtx)return;const t=audioCtx.currentTime;[0,0.55].forEach(off=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(0.0001,t+off);g.gain.exponentialRampToValueAtTime(0.22,t+off+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+off+0.4);o.start(t+off);o.stop(t+off+0.42);});}catch(e){}}
  function fireAlarm(){const b=document.getElementById('alarmBanner');b.hidden=false;setTimeout(()=>{b.hidden=true;},30000);beep();try{if('Notification' in window&&Notification.permission==='granted')new Notification('하루 다이어리',{body:'일기 쓸 시간이에요'});}catch(e){}}
  setInterval(()=>{if(!reminderTime)return;const n=new Date();const hhmm=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');const today=ymd(n);if(hhmm===reminderTime&&lastFired!==today){lastFired=today;fireAlarm();}},15000);

  /* 이벤트 */

  let calYear, calMonth;
  function entrySummary(ds){
    try{const v=localStorage.getItem('hd_diary:'+ds);if(!v)return null;const d=JSON.parse(v);
      const logsText=(d.logs||[]).map(l=>htmlText(l.text)).join(' ');
      const hasText=!!(htmlText(d.diary)||htmlText(d.memo)||htmlText(d.wish)||htmlText(d.reflect)||logsText).trim();
      return {photo:(d.photos&&d.photos[0])||d.photo||'', hasText, bookmarked:!!d.bookmarked};
    }catch(e){return null;}
  }
  function renderCalendar(){

    const todayS=ymd(new Date());
    for(let i=0;i<startDow;i++){const c=document.createElement('div');c.className='cal-cell empty';grid.appendChild(c);}

  /* 위치·날씨·시간 */
  let clockTimer=null;
  function pad2(n){return String(n).padStart(2,'0');}
  function fmtClock(d){let h=d.getHours();const m=pad2(d.getMinutes());const ap=h<12?'오전':'오후';let hh=h%12;if(hh===0)hh=12;return ap+' '+hh+':'+m;}
  function tickClock(){const el=document.getElementById('wiTime');if(el)el.textContent=fmtClock(new Date());}
  function startClock(){tickClock();clearInterval(clockTimer);clockTimer=setInterval(tickClock,20000);}
  function wcode(code){if(code===0)return{ic:'sun',label:'맑음'};if((code>=51&&code<=67)||(code>=80&&code<=82)||code>=95)return{ic:'rain',label:'비'};if(code>=71&&code<=77)return{ic:'cloud',label:'눈'};return{ic:'cloud',label:'흐림'};}
  async function fetchWeather(lat,lon,place){
    try{
      const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude='+lat+'&longitude='+lon+'&current=temperature_2m,weather_code&timezone=auto');
      const j=await r.json();const t=Math.round(j.current.temperature_2m);const code=j.current.weather_code;const w=wcode(code);
      document.getElementById('wiIcon').innerHTML=ICON[w.ic];
      document.getElementById('wiTemp').textContent=t+'° · '+w.label;
      if(place)document.getElementById('wiPlace').textContent=place;
      document.getElementById('locBtn').hidden=true;document.getElementById('weatherInfo').hidden=false;
      startClock();
      saveNow('wx',JSON.stringify({lat,lon,place:place||'',t,code,ts:Date.now()}));
    }catch(e){toast('날씨를 불러오지 못했어요');}
  }
  async function reverseGeo(lat,lon){try{const r=await fetch('https://api.bigdatacloud.net/data/reverse-geocode-client?latitude='+lat+'&longitude='+lon+'&localityLanguage=ko');const j=await r.json();return j.city||j.locality||j.principalSubdivision||'현재 위치';}catch(e){return '현재 위치';}}
  function requestLocation(){
    if(!navigator.geolocation){toast('위치를 지원하지 않는 기기예요');return;}
    document.getElementById('locBtn').innerHTML='<span>위치 확인 중…</span>';
    navigator.geolocation.getCurrentPosition(async(pos)=>{
      const lat=pos.coords.latitude,lon=pos.coords.longitude;const place=await reverseGeo(lat,lon);fetchWeather(lat,lon,place);
    },()=>{document.getElementById('locBtn').innerHTML='<span data-ic="pin"></span><span>위치 허용하고 날씨·시간 보기</span>';fillIcons();toast('위치 권한이 필요해요');
    },{enableHighAccuracy:false,timeout:10000,maximumAge:600000});
  }
  function initWeather(){
    try{const v=localStorage.getItem('hd_wx');if(v){const w=JSON.parse(v);const ww=wcode(w.code||0);
      document.getElementById('wiIcon').innerHTML=ICON[ww.ic];

  }

  /* 검색 */
  function runSearch(q){
    const list=document.getElementById('searchList');list.innerHTML='';
    q=(q||'').trim().toLowerCase();
    if(!q){list.innerHTML='<div class="hist-empty">키워드를 입력하면 해당 일기를 찾아드려요.</div>';return;}
    const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf('hd_diary:')===0)keys.push(k.slice(3));}
    const items=[];
    keys.forEach(k=>{try{const d=JSON.parse(localStorage.getItem('hd_'+k));const ds=k.slice(6);
      const text=[d.diary,d.memo,d.wish,d.reflect].map(htmlText).join(' ')+' '+(d.logs||[]).map(l=>htmlText(l.text)).join(' ');
      if(text.toLowerCase().includes(q))items.push({ds,snip:text.replace(/\s+/g,' ').trim(),mode:d.mode});
    }catch(e){}});
    items.sort((a,b)=>a.ds<b.ds?1:-1);
    if(!items.length){list.innerHTML='<div class="hist-empty">검색 결과가 없어요.</div>';return;}
    items.forEach(it=>{
      const row=document.createElement('div');row.className='hist-item';
      const main=document.createElement('div');main.className='hist-main';
      const dt=document.createElement('div');dt.className='hist-date';dt.textContent=fmtDate(new Date(it.ds+'T00:00:00'));
      const sn=document.createElement('div');sn.className='hist-snip';
      const idx=it.snip.toLowerCase().indexOf(q);const start=Math.max(0,idx-12);sn.textContent=(start>0?'…':'')+it.snip.slice(start,start+50);
      main.append(dt,sn);
      const tag=document.createElement('div');tag.className='hist-tag';tag.innerHTML=it.mode==='evening'?ICON.moon:ICON.sun;
      row.append(main,tag);
      row.onclick=()=>{document.getElementById('searchModal').hidden=true;openEditor(new Date(it.ds+'T00:00:00'));};
      list.appendChild(row);
    });
  }

  document.getElementById('searchInput').oninput=(e)=>runSearch(e.target.value);

  document.getElementById('addRoutine').onclick=()=>{routines.push(mk());renderRoutines();scheduleSaveRoutines();};
  document.getElementById('photoZone').onclick=(e)=>{if((day.photos||[]).length===0)document.getElementById('photoInput').click();};
  document.getElementById('photoInput').onchange=e=>{if(e.target.files&&e.target.files.length)readPhotos(e.target.files);e.target.value='';};
  document.getElementById('imgClose').onclick=()=>{document.getElementById('imgModal').hidden=true;};
  document.getElementById('imgModal').onclick=(ev)=>{if(ev.target.id==='imgModal')document.getElementById('imgModal').hidden=true;};
  document.getElementById('histBtn').onclick=(ev)=>{ev.stopPropagation();openHistory();};
  document.getElementById('histClose').onclick=()=>{document.getElementById('histModal').hidden=true;};
  document.getElementById('histModal').onclick=(ev)=>{if(ev.target.id==='histModal')document.getElementById('histModal').hidden=true;};
  document.getElementById('stkClose').onclick=()=>{document.getElementById('stkModal').hidden=true;};
  document.getElementById('stkModal').onclick=(ev)=>{if(ev.target.id==='stkModal')document.getElementById('stkModal').hidden=true;};
  const alarmPop=document.getElementById('alarmPop');
  document.getElementById('alarmBtn').onclick=(ev)=>{ev.stopPropagation();ensureAudio();closePops(alarmPop);alarmPop.classList.toggle('open');};
  alarmPop.onclick=(ev)=>ev.stopPropagation();
  document.getElementById('alarmTime').onchange=async(e)=>{reminderTime=e.target.value;await store.set('reminderTime',reminderTime);reflectAlarm();ensureAudio();try{if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();}catch(e){}};
  document.getElementById('alarmClear').onclick=async()=>{reminderTime='';document.getElementById('alarmTime').value='';await store.set('reminderTime','');reflectAlarm();};
  document.getElementById('alarmBannerClose').onclick=()=>{document.getElementById('alarmBanner').hidden=true;};
  const setPop=document.getElementById('setPop');
  document.getElementById('setBtn').onclick=(ev)=>{ev.stopPropagation();closePops(setPop);setPop.classList.toggle('open');};
  setPop.onclick=(ev)=>ev.stopPropagation();
  const nav=document.getElementById('navDate');
  document.getElementById('dateLabel').onclick=(ev)=>{ev.stopPropagation();try{nav.showPicker();}catch(e){nav.focus();nav.click();}};
  nav.onchange=()=>{if(nav.value){date=new Date(nav.value+'T00:00:00');loadDay();}};
  document.addEventListener('click',()=>closePops(null));

  /* 시작 */
  /* ===== 오프닝 / 비밀번호 / 잠금 ===== */
  const LS = {
    get: k => { try { return localStorage.getItem('hd_sys_'+k); } catch(e){ return null; } },
    set: (k,v) => { try { localStorage.setItem('hd_sys_'+k, v); } catch(e){} }
  };

  // 핀패드 만들기: container에 숫자패드 생성. onDigit(전체 입력문자열) 콜백.
  function buildPinpad(padEl, dotsEl, maxLen, onComplete) {
    let entered = '';
    function refresh() {
      dotsEl.innerHTML = '';
      for (let i=0;i<maxLen;i++){ const d=document.createElement('div'); d.className='pin-dot'+(i<entered.length?' filled':''); dotsEl.appendChild(d); }
    }
    refresh();
    padEl.innerHTML = '';
    [1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k=>{
      const b=document.createElement('button'); b.textContent=k; padEl.appendChild(b);
      if(k===''){ b.disabled=true; b.style.visibility='hidden'; return; }
      b.onclick=()=>{
        if(k==='⌫'){ entered=entered.slice(0,-1); }
        else if(entered.length<maxLen){ entered+=String(k); }
        refresh();
        if(entered.length===maxLen){ const v=entered; setTimeout(()=>onComplete(v, ()=>{ entered=''; refresh(); }),120); }
      };
    });
    return { reset: ()=>{ entered=''; refresh(); } };
  }

  // 앱 진입(홈 표시)
  function enterApp() {
    document.getElementById('splashScreen').style.display='none';
    document.getElementById('pwAskModal').hidden=true;
    document.getElementById('pwSetModal').hidden=true;
    document.getElementById('lockScreen').hidden=true;
    document.getElementById('home').style.display='';
  }

  // 비밀번호 설정 여부 묻기
  function askPassword() {
    const ask=document.getElementById('pwAskModal');
    ask.hidden=false;
    document.getElementById('pwAskNo').onclick=()=>{ LS.set('askedPw','1'); ask.hidden=true; enterApp(); };
    document.getElementById('pwAskYes').onclick=()=>{ ask.hidden=true; setupPassword(); };
  }

  // 4자리 설정 (입력 → 확인)
  function setupPassword() {
    const modal=document.getElementById('pwSetModal');
    const label=document.getElementById('pwSetLabel');
    const dots=document.getElementById('pwSetDots');
    const pad=document.getElementById('pwSetPad');
    const err=document.getElementById('pwSetErr');
    modal.hidden=false; err.textContent=''; label.textContent='새 비밀번호 4자리를 입력하세요';
    let first='';
    function startStage(){
      buildPinpad(pad, dots, 4, (code, reset)=>{
        if(!first){ first=code; label.textContent='한 번 더 입력하세요'; err.textContent=''; reset(); }
        else{
          if(code===first){ LS.set('pwCode', code); LS.set('askedPw','1'); modal.hidden=true; enterApp(); }
          else{ err.textContent='일치하지 않아요. 다시 설정해 주세요'; first=''; label.textContent='새 비밀번호 4자리를 입력하세요'; reset(); }
        }
      });
    }
    startStage();
  }

  // 잠금 화면 (접속 시)
  function showLock() {
    const lock=document.getElementById('lockScreen');
    const dots=document.getElementById('lockDots');
    const pad=document.getElementById('lockPad');
    const err=document.getElementById('lockErr');
    const stored=LS.get('pwCode');
    lock.hidden=false; err.textContent='';
    buildPinpad(pad, dots, 4, (code, reset)=>{
      if(code===stored){ lock.hidden=true; enterApp(); }
      else{ err.textContent='비밀번호가 틀렸어요'; reset(); }
    });
  }

  let __inited=false;
  (async function init(){
    if(__inited) return; __inited=true;
    fillIcons();buildSettings();
    (function(){const sg=document.getElementById('stkGrid');STICKERS.forEach(s=>{const b=document.createElement('button');b.innerHTML=s;b.onclick=()=>insertSticker(s);sg.appendChild(b);});})();
    await loadSettings();
    applyFont(curFont);applyTheme(curTheme);
    await loadRoutines();await loadReminder();
    const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
    day.mode=(now.getHours()>=4&&now.getHours()<14)?'morning':'evening';
    document.getElementById('editor').hidden=true;
    document.getElementById('locBtn').onclick=requestLocation;
    initWeather();showYesterday();
    renderCalendar();refreshTodayCard();
    // 홈은 잠금/설정 결정 전까지 숨김
    document.getElementById('home').style.display='none';

    // 오프닝: 페이드인 → 5초 후 페이드아웃 → 분기
    const splash = document.getElementById('splashScreen');
    requestAnimationFrame(()=>{ splash.style.opacity='1'; });   // 천천히 페이드인
    setTimeout(()=>{ splash.style.opacity='0'; }, 4000);        // 4초에 페이드아웃 시작(1초간)
    setTimeout(()=>{
      splash.style.display='none';
      const hasPw = LS.get('pwCode');
      const asked = LS.get('askedPw');
      if (hasPw) { showLock(); }
      else if (!asked) { askPassword(); }
      else { enterApp(); }
    }, 5000);
  })();
})();
</script>
</body></html>
